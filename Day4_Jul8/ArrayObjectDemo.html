<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type="button" onclick="arrayES6Fun('foreach')">ForEach</button>
    <button type="button" onclick="arrayES6Fun('map')">map</button>
    <button type="button" onclick="arrayES6Fun('filter')">filter</button>
    <button type="button" onclick="arrayES6Fun('find')">find</button>
    <button type="button" onclick="arrayES6Fun('findindex')">findIndex</button>
    <button type="button" onclick="arrayES6Fun('reduce')">reduce</button>
    <p id="result"></p>
    <script>
        let arr = [2,3,4,5,6,8]
        
        console.log(arr);
        let arrayES6Fun = (arg) => {
            let res =  document.getElementById("result")
            if(arg=="foreach"){
                arr.forEach((val,index)=>{
                    // console.log(val,index)
                    res.innerHTML += `Index= ${index} and value =${val}<BR>`
                })
            }
            else if(arg=="map"){
            //  let arr1 =  arr.map((val,i)=>{return val*2})
            //  let arr1 =  arr.map((val,i)=>val*2)
            //  let arr1 =  arr.map((val,i)=>`<h1>${val*2}</h1>`)
             let arr1 =  arr.map((val,i)=>Math.sqrt(val))
             res.innerHTML =`${arr} <br> ${arr1}`

            }
            else if(arg=="filter"){
                // let arr1 =  arr.filter((val,i)=>val > 2)
                let arr1 =  arr.filter((val,i)=>val != 5)
                res.innerHTML=arr1
            }
            else if(arg=="find"){
                res.innerHTML = arr.find((val)=>val==3)
                //if val==10 => return 10 otherwise undefined
            }
            else if(arg=="findindex"){
                   res.innerHTML = arr.findIndex((val)=>val==13)
                //if val==3 => return index of 3 otherwise -1
            }
            else if(arg=="reduce"){
                let total = arr.reduce((prev,curr)=>{return prev+curr})
                res.innerHTML = `${arr} and total = ${total}`
            }
        }

        //prev=0 , curr=2 = 0+2 =2
        //prev=2 , curr = 3 = 5
        //prev=5 , curr =4 = 9
        //prev = 9 curr= 5 = 14
        //prev=14, curr = 6 = 20
        //prev=20, curr =8 = 28
    </script>
</body>
</html>
