<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Calculator</h1>
   <label for="num1">Num1</label> 
   <input type="text" id="num1"> <br/>
  <label for="num2">Num2</label> 
  <input type="text"  id="num2"/><br/>
    <button type="button" onclick="addNum()">+</button>
    <div id="result"></div>
    <script>
          function addNum(){   
            let num1 =parseInt(document.getElementById("num1").value) //"5" => 5
            let num2 =Number(document.getElementById("num2").value) //"2"
            // alert(num1+num2)
            // console.log(document.getElementById("result").innerHTML)
           
            document.getElementById("result").innerHTML = `Addition of ${num1} and ${num2} is ${num1+num2}`
        }
    </script>
</body>
</html>
